<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoScope — Immersion Data Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ========== ALL ORIGINAL CSS (unchanged) ========== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --navy: #0f1f2e; --navy2: #162636; --blue: #1a6baa; --blue-lt: #2280cc; --sky: #e8f3fb; --slate: #4a6278; --line: #dde6ed; --text: #1a2a38; --muted: #7a94a8; --white: #ffffff; --bg: #f4f7fa; --sans: 'Plus Jakarta Sans', sans-serif; --serif: 'Fraunces', serif; }
  html, body { height: 100%; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); }
  .full-layout { display: flex; align-items: stretch; min-height: 100vh; height: 100%; }
  .left { flex: 1; background: var(--navy); display: flex; flex-direction: column; padding: 48px 56px; position: relative; overflow: hidden; }
  .left::before { content: ''; position: absolute; inset: 0; background-image: repeating-linear-gradient(0deg, transparent, transparent 44px, rgba(255,255,255,0.025) 44px, rgba(255,255,255,0.025) 45px), repeating-linear-gradient(90deg, transparent, transparent 44px, rgba(255,255,255,0.025) 44px, rgba(255,255,255,0.025) 45px); }
  .left::after { content: ''; position: absolute; bottom: -100px; right: -100px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(26,107,170,0.25) 0%, transparent 65%); pointer-events: none; }
  .logo { display: flex; align-items: center; gap: 12px; position: relative; z-index: 2; text-decoration: none; }
  .logo-mark { width: 38px; height: 38px; background: var(--blue-lt); border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-mark svg { width: 20px; height: 20px; }
  .logo-text { display: flex; flex-direction: column; line-height: 1; }
  .logo-name { font-size: 1.05rem; font-weight: 700; color: var(--white); letter-spacing: -0.01em; }
  .logo-sub { font-size: 0.6rem; font-weight: 400; color: rgba(255,255,255,0.4); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
  .hero-copy { position: relative; z-index: 2; flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 40px 0; }
  .eyebrow { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--blue-lt); margin-bottom: 18px; }
  .hero-title { font-family: var(--serif); font-weight: 300; font-size: clamp(2rem, 3.5vw, 2.8rem); color: var(--white); line-height: 1.2; margin-bottom: 20px; max-width: 420px; }
  .hero-title em { font-style: italic; color: rgba(255,255,255,0.55); }
  .hero-desc { font-size: 0.85rem; color: rgba(255,255,255,0.45); line-height: 1.75; max-width: 380px; font-weight: 300; }
  .map-card { position: relative; z-index: 2; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; overflow: hidden; margin-top: 32px; }
  .map-area { position: relative; height: 180px; overflow: hidden; background: #0a1825; }
  .map-area::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 50% at 40% 60%, rgba(26,107,170,0.12) 0%, transparent 70%), radial-gradient(ellipse 40% 60% at 70% 30%, rgba(15,30,50,0.5) 0%, transparent 60%); }
  .map-svg { width: 100%; height: 100%; position: absolute; inset: 0; }
  .roof { fill: #1c3349; stroke: rgba(255,255,255,0.12); stroke-width: 1; opacity: 0; animation: roofIn 0.5s ease forwards; }
  .roof:nth-child(1) { animation-delay: 0.2s; }
  .roof:nth-child(2) { animation-delay: 0.4s; }
  .roof:nth-child(3) { animation-delay: 0.6s; }
  .roof:nth-child(4) { animation-delay: 0.8s; }
  .roof:nth-child(5) { animation-delay: 1.0s; }
  @keyframes roofIn { to { opacity: 1; } }
  .outline { fill: none; stroke: rgba(34,128,204,0.8); stroke-width: 1.5; stroke-dasharray: 300; stroke-dashoffset: 300; animation: drawLine 1s ease forwards; }
  .outline:nth-child(6) { animation-delay: 0.3s; }
  .outline:nth-child(7) { animation-delay: 0.5s; }
  .outline:nth-child(8) { animation-delay: 0.7s; }
  .outline:nth-child(9) { animation-delay: 0.9s; }
  .outline:nth-child(10) { animation-delay: 1.1s; }
  @keyframes drawLine { to { stroke-dashoffset: 0; } }
  .hvac-unit { fill: #2280cc; opacity: 0; animation: dotPop 0.3s ease forwards; filter: drop-shadow(0 0 3px rgba(34,128,204,0.6)); }
  .hvac-unit:nth-child(11) { animation-delay: 1.3s; }
  .hvac-unit:nth-child(12) { animation-delay: 1.45s; }
  .hvac-unit:nth-child(13) { animation-delay: 1.6s; }
  .hvac-unit:nth-child(14) { animation-delay: 1.75s; }
  .hvac-unit:nth-child(15) { animation-delay: 1.9s; }
  .hvac-unit:nth-child(16) { animation-delay: 2.0s; }
  .hvac-unit:nth-child(17) { animation-delay: 2.1s; }
  @keyframes dotPop { 0% { opacity: 0; transform-origin: center; transform: scale(0); } 70% { transform: scale(1.3); } 100% { opacity: 1; transform: scale(1); } }
  .scan-line { position: absolute; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent 0%, rgba(34,128,204,0.5) 40%, rgba(34,128,204,0.5) 60%, transparent); animation: scanMap 5s linear infinite; top: 0; }
  @keyframes scanMap { 0% { top: 0; opacity: 0.7; } 90% { opacity: 0.7; } 100% { top: 100%; opacity: 0; } }
  .map-stats { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid rgba(255,255,255,0.08); }
  .stat { padding: 14px 16px; border-right: 1px solid rgba(255,255,255,0.08); }
  .stat:last-child { border-right: none; }
  .stat-n { font-size: 1.3rem; font-weight: 700; color: var(--white); letter-spacing: -0.03em; line-height: 1; }
  .stat-l { font-size: 0.58rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-top: 3px; }
  .left-footer { position: relative; z-index: 2; font-size: 0.62rem; color: rgba(255,255,255,0.2); letter-spacing: 0.06em; margin-top: 24px; }
  .right { width: 460px; flex-shrink: 0; background: var(--white); display: flex; flex-direction: column; justify-content: center; padding: 52px 48px; border-left: 1px solid var(--line); overflow-y: auto; }
  .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--line); margin-bottom: 36px; }
  .tab { flex: 1; padding: 12px 0; font-family: var(--sans); font-size: 0.78rem; font-weight: 600; letter-spacing: 0.02em; background: transparent; color: var(--muted); border: none; border-bottom: 2px solid transparent; margin-bottom: -2px; cursor: pointer; transition: all 0.2s; }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
  .tab:hover:not(.active) { color: var(--slate); }
  .form-panel { display: none; }
  .form-panel.active { display: block; animation: slideIn 0.25s ease both; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .form-title { font-family: var(--serif); font-weight: 600; font-size: 1.9rem; color: var(--navy); letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 6px; }
  .form-sub { font-size: 0.82rem; color: var(--muted); font-weight: 400; margin-bottom: 28px; line-height: 1.6; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 0.72rem; font-weight: 600; color: var(--slate); margin-bottom: 6px; letter-spacing: 0.01em; }
  .input-wrap { position: relative; }
  .field-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; stroke: var(--muted); fill: none; stroke-width: 1.7; pointer-events: none; transition: stroke 0.2s; }
  input { width: 100%; padding: 11px 14px 11px 40px; background: var(--bg); border: 1.5px solid var(--line); border-radius: 8px; color: var(--text); font-family: var(--sans); font-size: 0.85rem; font-weight: 400; outline: none; transition: all 0.2s; }
  input::placeholder { color: #b0c0cc; }
  input:focus { border-color: var(--blue-lt); background: var(--white); box-shadow: 0 0 0 3px rgba(34,128,204,0.1); }
  input:focus ~ .field-icon { stroke: var(--blue-lt); }
  .input-wrap:focus-within .field-icon { stroke: var(--blue-lt); }
  .forgot { display: block; text-align: right; font-size: 0.7rem; font-weight: 500; color: var(--blue-lt); text-decoration: none; margin-top: 5px; }
  .forgot:hover { color: var(--blue); text-decoration: underline; }
  .submit-btn { width: 100%; margin-top: 6px; padding: 13px; background: var(--blue); border: none; border-radius: 8px; color: var(--white); font-family: var(--sans); font-size: 0.85rem; font-weight: 600; letter-spacing: 0.02em; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 8px rgba(26,107,170,0.25), 0 1px 0 rgba(255,255,255,0.1) inset; }
  .submit-btn:hover { background: var(--blue-lt); box-shadow: 0 4px 16px rgba(26,107,170,0.35); transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--line); }
  .divider span { font-size: 0.68rem; color: var(--muted); white-space: nowrap; }
  .sso-btn { width: 100%; padding: 11px; background: var(--white); border: 1.5px solid var(--line); border-radius: 8px; color: var(--slate); font-family: var(--sans); font-size: 0.8rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; }
  .sso-btn:hover { border-color: #b0c4d4; color: var(--text); background: var(--bg); }
  .sso-btn svg { width: 15px; height: 15px; stroke: var(--slate); fill: none; stroke-width: 1.8; }
  .switch { margin-top: 24px; text-align: center; font-size: 0.78rem; color: var(--muted); }
  .switch a { color: var(--blue-lt); font-weight: 600; text-decoration: none; cursor: pointer; }
  .switch a:hover { text-decoration: underline; }
  .ids-strip { margin-top: 36px; padding-top: 20px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
  .ids-logo-sm { width: 28px; height: 28px; background: var(--navy); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ids-logo-sm svg { width: 14px; height: 14px; }
  .ids-text { font-size: 0.65rem; color: var(--muted); line-height: 1.4; }
  .ids-text strong { display: block; color: var(--slate); font-weight: 600; font-size: 0.68rem; }
  .form-error { margin-top: 10px; padding: 8px 12px; background: #fff2f0; border-left: 3px solid #e53e3e; font-size: 0.7rem; color: #c5292a; border-radius: 6px; font-weight: 500; }
  @media (max-width: 800px) { .left { display: none; } .right { width: 100%; padding: 40px 28px; } }
</style>
</head>
<body>
<div id="app-root"></div>

<!-- 6 modular scripts (order matters) -->
<script src="assets/config.js"></script>
<script src="assets/supabaseClient.js"></script>
<script src="assets/uiRenderer.js"></script>
<script src="assets/authHandlers.js"></script>
<script src="assets/uiInteractions.js"></script>
<script src="assets/bootstrap.js"></script>
</body>
</html>
